<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อีซูซุสหะภัณฑ์ - ศูนย์รวมเกม</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --isuzu-red: #ED1A3B; 
            --isuzu-red-hover: #c4132f; 
            --isuzu-dark: #1a1a1a; 
            --isuzu-white: #ffffff;
            --isuzu-silver: #888888;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: 'Prompt', sans-serif;
        }

        /* ----------------------------------------------------------- */
        /* Dynamic Graphic Background & Elements */
        /* ----------------------------------------------------------- */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* พระอาทิตย์ / พระจันทร์ ส่องแสงวูบวาบ */
        .celestial-body {
            position: absolute;
            border-radius: 50%;
            transition: all 2s ease;
            animation: glowPulse 3s infinite alternate ease-in-out;
        }

        @keyframes glowPulse {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.05); filter: brightness(1.2); }
        }

        /* เมฆ (เพิ่มจำนวนและปรับความเร็ว) */
        .clouds {
            position: absolute;
            top: 5%;
            width: 100%;
            height: 100%;
            opacity: 0.8;
            transition: opacity 2s ease;
        }
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        
        .cloud-1 { width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 45s; }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; right: 15px; }
        
        .cloud-2 { width: 90px; height: 30px; top: 25%; left: -150px; animation-duration: 35s; animation-delay: 5s; }
        .cloud-2::before { width: 40px; height: 40px; top: -15px; left: 10px; }
        .cloud-2::after { width: 50px; height: 50px; top: -25px; right: 15px; }

        .cloud-3 { width: 150px; height: 50px; top: 15%; left: -200px; animation-duration: 55s; animation-delay: 20s; opacity: 0.7;}
        .cloud-3::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud-3::after { width: 80px; height: 80px; top: -40px; right: 20px; }

        .cloud-4 { width: 80px; height: 25px; top: 35%; left: -100px; animation-duration: 25s; animation-delay: 10s; opacity: 0.9;}
        .cloud-4::before { width: 30px; height: 30px; top: -10px; left: 10px; }
        .cloud-4::after { width: 40px; height: 40px; top: -20px; right: 10px; }

        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* ภูเขาและต้นไม้ */
        .mountains {
            position: absolute;
            bottom: -5vh;
            width: 100%;
            height: 30vh;
        }
        .mountain {
            position: absolute;
            bottom: 0;
            border-radius: 50% 50% 0 0;
            transition: background 2s ease;
        }
        .mountain-1 { width: 120%; height: 100%; left: -10%; background: #4caf50; z-index: 1; }
        .mountain-2 { width: 80%; height: 70%; right: -10%; background: #388e3c; z-index: 2; }

        .trees {
            position: absolute;
            bottom: 25vh;
            width: 100%;
            z-index: 3;
            display: flex;
            justify-content: space-around;
        }
        .tree {
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 40px solid #1b5e20;
            position: relative;
            transition: border-bottom-color 2s ease;
        }
        .tree::after {
            content: '';
            position: absolute;
            top: 40px;
            left: -3px;
            width: 6px;
            height: 10px;
            background: #5d4037;
        }
        .tree:nth-child(2) { transform: scale(1.3) translateY(5px); }
        .tree:nth-child(4) { transform: scale(0.8) translateY(-5px); }

        /* ดาว */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 60px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 90px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* ฝนตก (จะทำงานเมื่อ API บอกว่าฝนตก) */
        .rain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://cdn.pixabay.com/photo/2016/03/05/23/02/rain-1239454_1280.png') repeat;
            opacity: 0;
            z-index: 4;
            animation: rainDrop 0.5s linear infinite;
            pointer-events: none;
        }
        @keyframes rainDrop {
            0% { background-position: 0 0; }
            100% { background-position: -20px 100vh; }
        }

        /* --- THEMES (เวลาและสภาพอากาศ) --- */
        /* เช้า */
        body.theme-morning #dynamic-bg { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
        body.theme-morning .celestial-body { width: 80px; height: 80px; background: #FFD700; top: 15%; left: 20%; box-shadow: 0 0 50px 15px rgba(255, 215, 0, 0.6); }
        
        /* บ่าย */
        body.theme-afternoon #dynamic-bg { background: linear-gradient(to bottom, #00BFFF, #87CEFA); }
        body.theme-afternoon .celestial-body { width: 90px; height: 90px; background: #FFF5EE; top: 10%; left: 50%; transform: translateX(-50%); box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.7); }
        
        /* เย็น */
        body.theme-evening #dynamic-bg { background: linear-gradient(to bottom, #FF7F50, #FFDAB9); }
        body.theme-evening .celestial-body { width: 100px; height: 100px; background: #FF4500; top: 40%; right: 15%; box-shadow: 0 0 60px 20px rgba(255, 69, 0, 0.6); }
        body.theme-evening .mountain-1 { background: #8B4513; }
        body.theme-evening .mountain-2 { background: #A0522D; }
        body.theme-evening .tree { border-bottom-color: #4e342e; }
        body.theme-evening .clouds { filter: hue-rotate(320deg) brightness(0.8); }

        /* กลางคืน */
        body.theme-night #dynamic-bg { background: linear-gradient(to bottom, #0B0C10, #1F2833); }
        body.theme-night .celestial-body { width: 70px; height: 70px; background: #FFF; top: 15%; right: 25%; box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0.4); }
        body.theme-night .mountain-1 { background: #111; }
        body.theme-night .mountain-2 { background: #0a0a0a; }
        body.theme-night .tree { border-bottom-color: #000; }
        body.theme-night .clouds { opacity: 0.15; }
        body.theme-night .stars { opacity: 1; animation: twinkle 3s infinite alternate; }

        /* สภาพอากาศแบบฝนตก/เมฆมาก (Override ทับ Theme เวลา) */
        body.weather-rainy .rain { opacity: 0.4; }
        body.weather-cloudy #dynamic-bg { background: linear-gradient(to bottom, #607D8B, #CFD8DC) !important; }
        body.weather-cloudy .celestial-body { opacity: 0.2; }
        body.weather-cloudy .clouds { opacity: 0.9; filter: grayscale(100%); }

        @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        /* ----------------------------------------------------------- */
        /* Layout การ์ดหลัก */
        /* ----------------------------------------------------------- */
        .wrapper { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            display: flex; justify-content: center; align-items: center; 
            padding: 15px; z-index: 10;
        }
        
        .card-container {
            width: 100%;
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px);
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 25px 20px 20px 20px; 
            text-align: center;
        }

        .logo-wrapper {
            width: 100%; max-width: 360px; margin-bottom: 10px; 
        }
        .logo-img {
            width: 100%; height: auto; max-height: 25vh; object-fit: contain; 
        }

        .promo-text-wrapper {
            margin-bottom: 15px; width: 100%;
        }
        .title-text {
            font-size: 1.25rem; font-weight: 800; color: var(--isuzu-dark); margin-bottom: 6px;
        }
        .desc-text {
            font-size: 0.8rem; color: #555555; line-height: 1.4;
            background: #fff5f6; padding: 10px 12px; border-radius: 10px;
            border: 1px dashed #f5c6cb; margin: 0;
        }
        /* ไฮไลท์สีแดง */
        .desc-text .highlight-red { color: var(--isuzu-red); font-weight: 800; }
        /* ไฮไลท์ตัวหนา (เดือนมีนาคม) */
        .desc-text .highlight-bold { font-weight: 900; color: #000; font-size: 0.85rem; text-decoration: underline; text-decoration-color: var(--isuzu-red); text-decoration-thickness: 2px;}
        .desc-text small { font-size: 0.7rem; color: #888; display: block; margin-top: 4px; }

        .button-group {
            width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;
        }
        .game-btn {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 60px; background-color: var(--isuzu-red); color: var(--isuzu-white);
            text-decoration: none; font-size: 1.25rem; font-weight: 800; border-radius: 12px; 
            box-shadow: 0 6px 0 #9e0e24, 0 6px 15px rgba(237, 26, 59, 0.3); transition: all 0.1s ease; 
        }
        .game-btn:active {
            transform: translateY(6px); box-shadow: 0 0px 0 #9e0e24, 0 2px 5px rgba(237, 26, 59, 0.4); 
            background-color: var(--isuzu-red-hover);
        }

        .hashtag {
            font-size: 1.05rem; font-weight: 800; letter-spacing: 0.5px;
            animation: colorCycle 4s infinite ease-in-out; margin: 0;
        }
        @keyframes colorCycle {
            0%, 100% { color: var(--isuzu-red); }
            33% { color: var(--isuzu-dark); }
            66% { color: var(--isuzu-silver); }
        }
    </style>
</head>
<body class="theme-morning"> <div id="dynamic-bg">
        <div class="stars"></div>
        <div class="celestial-body"></div>
        
        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="cloud cloud-4"></div>
        </div>
        
        <div class="trees">
            <div class="tree"></div>
            <div class="tree"></div>
            <div class="tree"></div>
            <div class="tree"></div>
            <div class="tree"></div>
        </div>

        <div class="mountains">
            <div class="mountain mountain-1"></div>
            <div class="mountain mountain-2"></div>
        </div>

        <div class="rain"></div>
    </div>

    <div class="wrapper">
        <div class="card-container">
            <div class="logo-wrapper">
                <img src="1.jpg" alt="อีซูซุสหะภัณฑ์" class="logo-img">
            </div>

            <div class="promo-text-wrapper">
                <p class="title-text">เลือกลุยได้เลย อยากเล่นเกมไหน!</p>
                <p class="desc-text">
                    เพียงนำรถเข้าเช็กระยะหรือซ่อมที่ศูนย์บริการ <span class="highlight-red">อีซูซุสหะภัณฑ์</span> ใน<span class="highlight-bold">เดือนมีนาคม</span> ก็มีสิทธิ์เล่นเกมลุ้นรางวัลฟรีได้ทุกสิ้นเดือน!
                    <small>(ประกาศผลสัปดาห์แรกในเดือนถัดไป)</small>
                </p>
            </div>

            <div class="button-group">
                <a href="https://pongpit6.github.io/ISUZU-SP-Card-Matching/" class="game-btn">
                    เกมจับคู่
                </a>
                <a href="https://pongpit6.github.io/ISUZU-SP-Runner-Challenge/" class="game-btn">
                    D-Max ตะลุยด่าน
                </a>
            </div>

            <p class="hashtag">#อีซูซุสหะภัณฑ์ไม่ต้องรอนาน</p>
        </div>
    </div>

    <script>
        // ฟังก์ชันอัปเดตเวลาและแสง
        function updateTimeTheme() {
            const currentHour = new Date().getHours();
            const body = document.body;
            
            body.classList.remove('theme-morning', 'theme-afternoon', 'theme-evening', 'theme-night');

            if (currentHour >= 6 && currentHour < 12) {
                body.classList.add('theme-morning');
            } else if (currentHour >= 12 && currentHour < 17) {
                body.classList.add('theme-afternoon');
            } else if (currentHour >= 17 && currentHour < 20) {
                body.classList.add('theme-evening');
            } else {
                body.classList.add('theme-night');
            }
        }

        // ฟังก์ชันเรียก API สภาพอากาศจาก Open-Meteo
        async function fetchWeather() {
            try {
                // เช็คว่า Browser รองรับ Geolocation ไหม
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        await applyWeatherAPI(lat, lon);
                    }, async () => {
                        // ถ้าผู้ใช้ไม่อนุญาต ให้ใช้พิกัดกลางๆ (กทม.) แทน
                        await applyWeatherAPI(14.0041, 99.5483); 
                    });
                } else {
                    await applyWeatherAPI(14.0041, 99.5483); 
                }
            } catch (error) {
                console.log("Weather API failed, using default time themes.");
            }
        }

        async function applyWeatherAPI(lat, lon) {
            // ดึงข้อมูลอากาศสดผ่าน Open-Meteo
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await response.json();
            const weatherCode = data.current_weather.weathercode;

            const body = document.body;
            body.classList.remove('weather-rainy', 'weather-cloudy');

            // อ้างอิง WMO Weather interpretation codes
            if (weatherCode >= 51 && weatherCode <= 99) {
                // กลุ่มฝนตก พายุ
                body.classList.add('weather-rainy');
                body.classList.add('weather-cloudy'); 
            } else if (weatherCode === 3 || weatherCode === 2) {
                // กลุ่มเมฆมาก
                body.classList.add('weather-cloudy');
            }
        }

        // โหลดตีมเวลาทันที
        updateTimeTheme();
        
        // ลองดึงสภาพอากาศ
        fetchWeather();

        // อัปเดตเวลาทุกๆ 1 นาที
        setInterval(updateTimeTheme, 60000); 
    </script>
</body>
</html>
